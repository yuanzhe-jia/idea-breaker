<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idea Breaker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>Idea Breaker</h1>
      <div class="sub" id="DT"></div>
    </div>
    <div id="C">
      <div id="T" style="background:#f0f0ee"></div>
      <div class="bot">
        <p id="X"></p>
        <div class="foot">
          <span id="G"></span>
          <div class="arr">
            <button id="P" aria-label="Previous">←</button>
            <button id="N" aria-label="Next">→</button>
          </div>
        </div>
      </div>
    </div>
    <div class="tip">← → Arrow keys or swipe to navigate</div>
    <div class="refresh">
      <button id="R" aria-label="Refresh AI Insights">Refresh AI Insights</button>
    </div>
    <div class="status" id="ST"></div>
  </div>
  <script type="module" src="src/scripts/app.js"></script>
</body>
</html>
